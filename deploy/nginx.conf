# Nginx 配置 — 阿里云 ECS 部署
#
# 使用方法：
#   1. 将此文件复制到 /etc/nginx/conf.d/nimbus-chat.conf
#   2. 把 YOUR_DOMAIN_OR_IP 替换为你的域名或公网 IP
#   3. 如使用域名 + HTTPS，用 certbot 申请证书后会自动改写 80 → 443 跳转
#
# 注意：
#   - WebSocket（Socket.IO）需要 Upgrade 头转发
#   - 前端 SPA 所有未匹配路由都 fallback 到 index.html

upstream nimbus_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # 前端静态资源（Vite 构建产物）
    root /opt/nimbus-chat/dist;
    index index.html;

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # 静态资源长缓存（Vite 构建产物文件名带 hash）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API 接口反代到后端
    location /api/ {
        proxy_pass http://nimbus_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Socket.IO 反代 — 必须支持 WebSocket 升级
    location /socket.io/ {
        proxy_pass http://nimbus_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;  # WebSocket 长连接超时
        proxy_send_timeout 86400s;
    }

    # 健康检查
    location /health {
        proxy_pass http://nimbus_backend;
    }

    # SPA fallback — 所有前端路由都返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 安全相关 headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
